spring:
  application:
    name: contract-agent-mvp

  # PostgreSQL (pgvector); use compose.yaml in this module or:
  # docker run -p 5432:5432 -e POSTGRES_PASSWORD=postgres pgvector/pgvector:pg16
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:contract_agent}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:123456}
    driver-class-name: org.postgresql.Driver

  ai:
    # Shared OpenAI-compatible endpoint (DashScope, OpenAI, etc.).
    openai:
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      api-key: ${OPENAI_API_KEY:${API_KEY:${api-key:}}}

      # Only chat model is required for the minimal contract QA flow.
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:qwen-plus}
          temperature: 0.2

      # Embedding model for RAG / pgvector; spring.ai.vectorstore.pgvector.dimensions MUST match this model's output size
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-v3}

    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        # Must equal embedding vector length; change model or this value => drop/recreate vector_store or set remove-existing-vector-store-table
        dimensions: ${OPENAI_EMBEDDING_DIMENSIONS:1024}
        max-document-batch-size: 10000

server:
  port: 8088
